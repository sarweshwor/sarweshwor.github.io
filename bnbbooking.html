<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mountain View BnB — Booking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0d;--surface:#111115;--panel:#18181f;--border:#222230;
  --accent:#00e5a0;--gold:#d4af37;--text:#e8e8f0;--muted:#5a5a70;
  --font:'DM Mono',monospace;--head:'Syne',sans-serif;--serif:'Playfair Display',serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);}

/* Header */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:1rem 4rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
}
.logo{
  font-family:var(--serif);font-style:italic;font-size:1.4rem;
  color:var(--gold);letter-spacing:0.02em;
}
.logo span{font-style:normal;font-family:var(--head);color:var(--muted);font-size:0.7rem;display:block;letter-spacing:0.2em;text-transform:uppercase;margin-top:-4px;}
nav{display:flex;gap:2rem;}
nav a{color:var(--muted);text-decoration:none;font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.15s;}
nav a:hover{color:var(--accent);}
.book-btn{
  background:var(--gold);color:#0a0a0d;border:none;font-family:var(--font);
  font-size:0.75rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  padding:0.6rem 1.5rem;cursor:pointer;transition:opacity 0.15s;
}
.book-btn:hover{opacity:0.85;}

/* Hero */
.hero{
  padding:5rem 4rem;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(212,175,55,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(0,229,160,0.04) 0%, transparent 50%);
  border-bottom:1px solid var(--border);
  text-align:center;
}
.hero-sub{font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.hero h1{
  font-family:var(--serif);font-size:clamp(2.5rem,6vw,4.5rem);
  font-weight:700;line-height:1.15;margin-bottom:1.5rem;
}
.hero h1 em{color:var(--gold);font-style:italic;}
.hero p{color:var(--muted);max-width:500px;margin:0 auto 2.5rem;font-size:0.9rem;line-height:1.8;}

/* Search Box */
.search-box{
  background:var(--surface);border:1px solid var(--border);
  padding:1.5rem 2rem;max-width:800px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:1rem;align-items:end;
}
.field-group{display:flex;flex-direction:column;gap:0.35rem;}
.field-group label{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
.field-group input,.field-group select{
  background:var(--panel);border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:0.85rem;
  padding:0.65rem;outline:none;transition:border-color 0.15s;
}
.field-group input:focus,.field-group select:focus{border-color:var(--accent);}
.search-btn{
  background:var(--accent);color:#0a0a0d;border:none;
  font-family:var(--font);font-weight:500;font-size:0.82rem;
  padding:0.65rem 1.5rem;cursor:pointer;transition:opacity 0.15s;white-space:nowrap;
}
.search-btn:hover{opacity:0.85;}

/* Results */
.results-section{padding:3rem 4rem;max-width:1100px;margin:0 auto;}
.results-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2rem;
}
.results-title{font-family:var(--head);font-size:1.1rem;font-weight:700;}
.results-count{font-size:0.78rem;color:var(--muted);}
.filter-row{display:flex;gap:0.5rem;}
.filter-chip{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  font-family:var(--font);font-size:0.68rem;letter-spacing:0.08em;
  padding:0.3rem 0.8rem;cursor:pointer;transition:all 0.15s;
}
.filter-chip:hover,.filter-chip.active{border-color:var(--accent);color:var(--accent);}

/* Room cards */
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;}
.room-card{
  background:var(--surface);border:1px solid var(--border);overflow:hidden;
  transition:border-color 0.2s,transform 0.2s;cursor:pointer;
}
.room-card:hover{border-color:rgba(212,175,55,0.3);transform:translateY(-2px);}
.room-img{
  height:160px;display:flex;align-items:center;justify-content:center;
  font-size:4rem;background:var(--panel);border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.room-badge{
  position:absolute;top:0.8rem;right:0.8rem;
  font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;
  padding:0.2rem 0.6rem;font-weight:500;
}
.badge-available{background:rgba(0,229,160,0.15);color:var(--accent);border:1px solid rgba(0,229,160,0.3);}
.badge-limited{background:rgba(212,175,55,0.15);color:var(--gold);border:1px solid rgba(212,175,55,0.3);}
.badge-booked{background:rgba(255,77,109,0.15);color:#ff4d6d;border:1px solid rgba(255,77,109,0.3);}
.room-body{padding:1.2rem;}
.room-type{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem;}
.room-name{font-family:var(--head);font-size:1rem;font-weight:700;margin-bottom:0.6rem;}
.room-desc{font-size:0.78rem;color:var(--muted);line-height:1.6;margin-bottom:0.8rem;}
.room-amenities{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.8rem;}
.amenity{font-size:0.62rem;padding:0.2rem 0.5rem;background:var(--panel);border:1px solid var(--border);color:var(--muted);}
.room-footer{display:flex;align-items:center;justify-content:space-between;}
.room-price{font-family:var(--head);font-size:1.1rem;color:var(--gold);}
.room-price-sub{font-size:0.65rem;color:var(--muted);}
.book-room-btn{
  background:transparent;border:1px solid var(--gold);color:var(--gold);
  font-family:var(--font);font-size:0.72rem;padding:0.4rem 0.9rem;
  cursor:pointer;transition:all 0.15s;
}
.book-room-btn:hover{background:var(--gold);color:#0a0a0d;}
.book-room-btn:disabled{border-color:var(--border);color:var(--muted);cursor:not-allowed;}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  width:460px;max-height:90vh;overflow-y:auto;
  transform:translateY(16px);transition:transform 0.2s;
}
.modal-backdrop.open .modal{transform:none;}
.modal-header{
  padding:1.5rem;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.modal-title{font-family:var(--head);font-size:1rem;font-weight:700;}
.modal-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:1.5rem;}
.modal-room-name{font-family:var(--serif);font-size:1.3rem;color:var(--gold);margin-bottom:1rem;}
.booking-summary{
  background:var(--panel);border:1px solid var(--border);
  padding:1rem;margin-bottom:1.2rem;
}
.summary-row{
  display:flex;justify-content:space-between;font-size:0.8rem;
  padding:0.3rem 0;border-bottom:1px solid var(--border);
}
.summary-row:last-child{border-bottom:none;padding-top:0.5rem;font-weight:600;}
.summary-label{color:var(--muted);}
.summary-val{color:var(--text);}
.summary-total{color:var(--gold);font-size:0.95rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:0.8rem;}
.form-field{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:0.8rem;}
.form-field label{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
.form-field input,.form-field select{
  background:var(--bg);border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:0.82rem;
  padding:0.6rem;outline:none;transition:border-color 0.15s;
}
.form-field input:focus,.form-field select:focus{border-color:var(--accent);}
.confirm-btn{
  width:100%;background:var(--accent);color:#0a0a0d;border:none;
  font-family:var(--font);font-weight:500;font-size:0.88rem;
  padding:0.85rem;cursor:pointer;margin-top:0.5rem;transition:opacity 0.15s;
}
.confirm-btn:hover{opacity:0.85;}

/* Success */
.success-state{
  text-align:center;padding:2rem;
}
.success-icon{font-size:3rem;margin-bottom:1rem;}
.success-title{font-family:var(--head);font-size:1.2rem;color:var(--accent);margin-bottom:0.5rem;}
.success-sub{color:var(--muted);font-size:0.82rem;line-height:1.7;}
.booking-ref{
  background:var(--panel);border:1px solid var(--border);
  padding:0.8rem 1.2rem;margin:1rem 0;font-family:var(--font);
  letter-spacing:0.15em;font-size:0.88rem;color:var(--accent);text-align:center;
}

/* No results */
.no-results{
  grid-column:1/-1;text-align:center;padding:4rem;color:var(--muted);
}
.no-results-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.4;}

@media(max-width:700px){
  header{padding:1rem 1.5rem;}
  .hero{padding:3rem 1.5rem;}
  .search-box{grid-template-columns:1fr;padding:1rem 1.2rem;}
  .results-section{padding:2rem 1.5rem;}
  nav{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="logo">Mountain View<span>// Bed & Breakfast</span></div>
  <nav>
    <a href="#rooms">Rooms</a>
    <a href="#about">About</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </nav>
  <button class="book-btn" onclick="document.querySelector('.search-box').scrollIntoView({behavior:'smooth'})">Book Now</button>
</header>

<div class="hero">
  <p class="hero-sub">Kathmandu Valley, Nepal</p>
  <h1>Stay where the<br/><em>mountains whisper.</em></h1>
  <p>A boutique bed &amp; breakfast nestled in the heart of Kathmandu — where traditional charm meets modern comfort.</p>

  <div class="search-box">
    <div class="field-group">
      <label>Check-in</label>
      <input type="date" id="check-in"/>
    </div>
    <div class="field-group">
      <label>Check-out</label>
      <input type="date" id="check-out"/>
    </div>
    <div class="field-group">
      <label>Guests</label>
      <select id="guests">
        <option value="1">1 Guest</option>
        <option value="2" selected>2 Guests</option>
        <option value="3">3 Guests</option>
        <option value="4">4 Guests</option>
      </select>
    </div>
    <button class="search-btn" onclick="searchRooms()">Check Availability →</button>
  </div>
</div>

<div class="results-section" id="rooms">
  <div class="results-header">
    <div>
      <div class="results-title">Our Rooms</div>
      <div class="results-count" id="results-count">Showing all 6 rooms</div>
    </div>
    <div class="filter-row">
      <button class="filter-chip active" onclick="filterRooms('all',this)">All</button>
      <button class="filter-chip" onclick="filterRooms('standard',this)">Standard</button>
      <button class="filter-chip" onclick="filterRooms('deluxe',this)">Deluxe</button>
      <button class="filter-chip" onclick="filterRooms('suite',this)">Suite</button>
    </div>
  </div>

  <div class="rooms-grid" id="rooms-grid"></div>
</div>

<!-- Booking Modal -->
<div class="modal-backdrop" id="booking-modal" onclick="closeModalOut(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-header">
      <div class="modal-title">Complete Your Booking</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const ROOMS=[
  {id:1,name:'Garden View Room',type:'standard',emoji:'🌿',price:85,maxGuests:2,
   desc:'A cosy retreat with lush garden views and traditional wooden decor.',
   amenities:['WiFi','Breakfast','AC','Hot Water'],available:true},
  {id:2,name:'Mountain Deluxe',type:'deluxe',emoji:'🏔️',price:135,maxGuests:2,
   desc:'Wake up to panoramic Himalayan views from your private balcony.',
   amenities:['WiFi','Breakfast','AC','Balcony','Mini-bar'],available:true},
  {id:3,name:'Heritage Suite',type:'suite',emoji:'🏛️',price:220,maxGuests:4,
   desc:'Our flagship suite with authentic Newari architecture, living room and king bed.',
   amenities:['WiFi','Breakfast','AC','Balcony','Mini-bar','Bathtub','Butler'],available:true},
  {id:4,name:'Courtyard Room',type:'standard',emoji:'🪴',price:75,maxGuests:2,
   desc:'A peaceful room overlooking our traditional courtyard fountain.',
   amenities:['WiFi','Breakfast','AC'],available:false},
  {id:5,name:'Valley Suite',type:'suite',emoji:'🌄',price:195,maxGuests:3,
   desc:'Elevated suite with valley views, premium linens, and a private jacuzzi.',
   amenities:['WiFi','Breakfast','AC','Balcony','Jacuzzi','Mini-bar'],available:true},
  {id:6,name:'Lotus Deluxe',type:'deluxe',emoji:'🪷',price:120,maxGuests:2,
   desc:'A serene room with lotus pond views and handcrafted Nepali furnishings.',
   amenities:['WiFi','Breakfast','AC','Balcony'],available:true},
];

let filterType='all';
let checkIn=null,checkOut=null,guests=2;
let selectedRoom=null;

// Set default dates
const today=new Date();
const tomorrow=new Date(today);tomorrow.setDate(today.getDate()+1);
const twoDays=new Date(today);twoDays.setDate(today.getDate()+3);
document.getElementById('check-in').value=today.toISOString().split('T')[0];
document.getElementById('check-out').value=twoDays.toISOString().split('T')[0];

function searchRooms(){
  checkIn=document.getElementById('check-in').value;
  checkOut=document.getElementById('check-out').value;
  guests=parseInt(document.getElementById('guests').value);
  if(!checkIn||!checkOut){alert('Please select dates');return;}
  if(new Date(checkIn)>=new Date(checkOut)){alert('Check-out must be after check-in');return;}
  renderRooms();
  document.getElementById('rooms').scrollIntoView({behavior:'smooth'});
}

function filterRooms(type,el){
  filterType=type;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderRooms();
}

function getNights(){
  if(!checkIn||!checkOut) return null;
  return Math.ceil((new Date(checkOut)-new Date(checkIn))/(1000*60*60*24));
}

function renderRooms(){
  let rooms=ROOMS;
  if(filterType!=='all') rooms=rooms.filter(r=>r.type===filterType);
  if(guests) rooms=rooms.filter(r=>r.maxGuests>=guests);

  const nights=getNights();
  document.getElementById('results-count').textContent=
    checkIn&&checkOut
      ? `${rooms.length} room${rooms.length!==1?'s':''} available · ${nights} night${nights!==1?'s':''}`
      : `Showing ${rooms.length} room${rooms.length!==1?'s':''}`;

  const el=document.getElementById('rooms-grid');
  if(!rooms.length){
    el.innerHTML=`<div class="no-results"><div class="no-results-icon">🔍</div>No rooms match your search.</div>`;
    return;
  }

  el.innerHTML=rooms.map(r=>{
    const badgeClass=!r.available?'badge-booked':r.id===2?'badge-limited':'badge-available';
    const badgeText=!r.available?'Fully Booked':r.id===2?'Last Room':'Available';
    const priceDisplay=nights?`$${r.price*nights} <span style="font-size:0.65rem;color:var(--muted)">total</span>`:`$${r.price} <span style="font-size:0.65rem;color:var(--muted)">/night</span>`;
    return `<div class="room-card" onclick="${r.available?`openBooking(${r.id})`:``}">
      <div class="room-img">
        <span style="font-size:4.5rem">${r.emoji}</span>
        <span class="room-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="room-body">
        <div class="room-type">${r.type}</div>
        <div class="room-name">${r.name}</div>
        <div class="room-desc">${r.desc}</div>
        <div class="room-amenities">${r.amenities.map(a=>`<span class="amenity">${a}</span>`).join('')}</div>
        <div class="room-footer">
          <div><div class="room-price">${priceDisplay}</div></div>
          <button class="book-room-btn" ${!r.available?'disabled':''} onclick="event.stopPropagation();${r.available?`openBooking(${r.id})`:``}">${r.available?'Book Now':'Unavailable'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openBooking(id){
  selectedRoom=ROOMS.find(r=>r.id===id);
  const ci=checkIn||today.toISOString().split('T')[0];
  const co=checkOut||twoDays.toISOString().split('T')[0];
  const nights=Math.max(1,Math.ceil((new Date(co)-new Date(ci))/(1000*60*60*24)));
  const total=selectedRoom.price*nights;

  document.getElementById('modal-body').innerHTML=`
    <div class="modal-room-name">${selectedRoom.emoji} ${selectedRoom.name}</div>
    <div class="booking-summary">
      <div class="summary-row"><span class="summary-label">Check-in</span><span class="summary-val">${formatDate(ci)}</span></div>
      <div class="summary-row"><span class="summary-label">Check-out</span><span class="summary-val">${formatDate(co)}</span></div>
      <div class="summary-row"><span class="summary-label">Nights</span><span class="summary-val">${nights}</span></div>
      <div class="summary-row"><span class="summary-label">Guests</span><span class="summary-val">${guests||2}</span></div>
      <div class="summary-row"><span class="summary-label">Rate</span><span class="summary-val">$${selectedRoom.price}/night</span></div>
      <div class="summary-row"><span class="summary-label">Total</span><span class="summary-val summary-total">$${total}</span></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>First Name</label><input id="b-first" placeholder="Your name"/></div>
      <div class="form-field"><label>Last Name</label><input id="b-last" placeholder="Last name"/></div>
    </div>
    <div class="form-field"><label>Email</label><input type="email" id="b-email" placeholder="your@email.com"/></div>
    <div class="form-field"><label>Phone</label><input type="tel" id="b-phone" placeholder="+977 …"/></div>
    <div class="form-field"><label>Special Requests (optional)</label><input id="b-notes" placeholder="Dietary needs, late check-in…"/></div>
    <button class="confirm-btn" onclick="confirmBooking()">Confirm Booking — $${total} →</button>
  `;
  document.getElementById('booking-modal').classList.add('open');
}

function confirmBooking(){
  const first=document.getElementById('b-first').value.trim();
  const last=document.getElementById('b-last').value.trim();
  const email=document.getElementById('b-email').value.trim();
  if(!first||!last||!email){alert('Please fill in your name and email.');return;}
  const ref='MVB-'+Math.random().toString(36).toUpperCase().slice(2,8);
  document.getElementById('modal-body').innerHTML=`
    <div class="success-state">
      <div class="success-icon">🎉</div>
      <div class="success-title">Booking Confirmed!</div>
      <div class="success-sub">Thank you, ${first}! Your stay at Mountain View BnB has been reserved.</div>
      <div class="booking-ref">Ref: ${ref}</div>
      <div class="success-sub">A confirmation will be sent to <strong style="color:var(--text)">${email}</strong><br/>
      We look forward to welcoming you! 🏔️</div>
    </div>
  `;
}

function closeModal(){document.getElementById('booking-modal').classList.remove('open');}
function closeModalOut(e){if(e.target===document.getElementById('booking-modal'))closeModal();}

function formatDate(d){
  const date=new Date(d+'T00:00:00');
  return date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

renderRooms();
</script>
</body>
</html>
